name: Deploy YOLE SHOP APP to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          GITHUB_PAGES: 'true'
          VITE_SUPABASE_URL_1: ${{ secrets.VITE_SUPABASE_URL_1 }}
          VITE_SUPABASE_PUBLISHABLE_KEY_1: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_1 }}
          VITE_SUPABASE_URL_2: ${{ secrets.VITE_SUPABASE_URL_2 }}
          VITE_SUPABASE_PUBLISHABLE_KEY_2: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_2 }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
